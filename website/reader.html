<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">
          <span class="logo-icon">🚀</span>
          <span>StackReady</span>
        </a>

        <button class="menu-toggle" id="tocToggle" aria-label="Toggle table of contents">☰</button>

        <nav class="header-nav">
          <a href="index.html" class="nav-link">← Dashboard</a>
          <a href="https://neetcode.io/practice/practice/neetcode150" class="nav-link nav-external" target="_blank" rel="noopener noreferrer">NeetCode 150</a>
          <a href="https://takeuforward.org/interviews/strivers-sde-sheet-top-coding-interview-problems/" class="nav-link nav-external" target="_blank" rel="noopener noreferrer">Striver SDE</a>
        </nav>
      </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="reader-layout">
      <aside class="reader-sidebar" id="readerSidebar">
        <h3>Table of Contents</h3>
        <ul class="toc-list" id="tocList">
          <li class="toc-item"><span style="color:var(--gray-400);font-size:0.85rem;">Loading...</span></li>
        </ul>
      </aside>

      <div class="reader-main">
        <div class="reader-breadcrumb" id="breadcrumb">
          <a href="index.html">Home</a> / <span id="breadcrumbTitle">Loading...</span>
        </div>

        <div class="reader-toolbar" id="readerToolbar" style="display:none;">
          <span class="doc-title" id="docTitle"></span>
          <div class="font-size-controls">
            <button class="font-size-btn" data-size="sm" title="Smaller text">A-</button>
            <button class="font-size-btn active" data-size="md" title="Default text">A</button>
            <button class="font-size-btn" data-size="lg" title="Larger text">A+</button>
          </div>
          <button class="btn btn-outline" id="markCompleteBtn">Mark as Read</button>
        </div>

        <div id="contentArea">
          <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading study material...</p>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p style="font-size:0.85rem;color:var(--gray-400);">Progress saved in your browser cookies · Created by <strong>Prabhat Singh Rajput</strong></p>
      </div>
    </footer>
  </div>

  <script src="config.js"></script>

  <script src="assets/js/reader.js"></script>
